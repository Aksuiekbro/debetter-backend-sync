services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/debetter}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-debetter_user}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-debetter_dev_password}
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST:-redis}
      SPRING_REDIS_PORT: ${SPRING_REDIS_PORT:-6379}
      SPRING_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD:-debetter_redis_password}
      SECURITY_REMEMBER_ME_KEY: ${SECURITY_REMEMBER_ME_KEY:-dev-remember-me-key-change-me}
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgres:16.3-alpine3.20
    container_name: debetter-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-debetter}
      POSTGRES_USER: ${POSTGRES_USER:-debetter_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-debetter_dev_password}
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:8.0.3-alpine
    container_name: debetter-redis
    command: [redis-server, "--requirepass", "${SPRING_REDIS_PASSWORD:-debetter_redis_password}"]
    ports:
      - "6381:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  db-data:
  redis-data:
