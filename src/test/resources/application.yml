spring:
  application:
    name: debetter
  datasource:
    url: jdbc:h2:mem:debetter_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        search:
          backend:
            type: lucene
            directory:
              type: local-filesystem
              root: target/test-lucene-indexes
            analysis:
              configurer: class:com.heliozz10.debetter.config.LuceneAnalysisConfig
  liquibase:
    enabled: false
  mvc:
    servlet:
      path: /api

security:
  remember-me:
    key: test-remember-me-key

app:
  file-upload:
    storage-path: target/test-uploads
    public-url-prefix: /uploads/
    max-file-size: 5242880
